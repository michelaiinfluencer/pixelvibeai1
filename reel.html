<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reel — PixelVibe AI</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
    <link rel="icon" href="assets/logoPixel2.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="subpage">

    <!-- ─── NAVIGATION ─── -->
    <div id="nav-placeholder"></div>
    <script src="assets/nav.js"></script>

    <main>
        <!-- ─── VIDEO REEL CAROUSEL ─── -->
        <section id="reel" style="padding-top: 140px; background: var(--black);">
            <div class="reel-header fade-up">
                <span class="section-eyebrow" style="color:rgba(255,255,255,0.45);">Our Reel</span>
                <h2 class="section-title" style="color: var(--white);">Motion in Motion</h2>
                <p class="section-sub" style="color: rgba(255,255,255,0.7);">Four pieces from our AI video production
                    suite — looping, always evolving.</p>
            </div>

            <div class="reel-carousel" id="reelCarousel">
                <div class="reel-slide active" data-index="0">
                    <video id="rv0" autoplay muted loop playsinline>
                        <source src="assets/hero-bg.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="reel-slide" data-index="1">
                    <video id="rv1" muted loop playsinline>
                        <source src="assets/v2.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="reel-slide" data-index="2">
                    <video id="rv2" muted loop playsinline>
                        <source src="assets/v3.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="reel-slide" data-index="3">
                    <video id="rv3" muted loop playsinline>
                        <source src="assets/v4.mp4" type="video/mp4">
                    </video>
                </div>
            </div>

            <div class="reel-controls">
                <button class="reel-btn" id="reelPrev" aria-label="Previous">&#8592;</button>
                <div class="reel-dots" id="reelDots">
                    <div class="reel-dot active" data-slide="0"></div>
                    <div class="reel-dot" data-slide="1"></div>
                    <div class="reel-dot" data-slide="2"></div>
                    <div class="reel-dot" data-slide="3"></div>
                </div>
                <button class="reel-btn" id="reelNext" aria-label="Next">&#8594;</button>
            </div>
            <div class="reel-counter-wrap"
                style="text-align: center; margin-top: 20px; color: var(--white); font-family: var(--font-mono); font-size: var(--fs-sm);">
                <span id="reelCounter">1 / 4</span>
            </div>
        </section>
    </main>

    <!-- ─── FOOTER ─── -->
    <footer id="footer-placeholder"></footer>
    <script src="assets/main.js"></script>
    <script src="assets/footer.js"></script>
    <script>
        /* ─── REEL CAROUSEL ─── */
        const reelSlides = document.querySelectorAll('.reel-slide');
        const reelDots = document.querySelectorAll('.reel-dot');
        const reelCounter = document.getElementById('reelCounter');
        let reelIdx = 0;

        function goReelSlide(idx) {
            const oldVid = reelSlides[reelIdx].querySelector('video');
            if (oldVid) oldVid.pause();
            reelSlides[reelIdx].classList.remove('active');
            reelDots[reelIdx].classList.remove('active');

            reelIdx = (idx + reelSlides.length) % reelSlides.length;

            reelSlides[reelIdx].classList.add('active');
            reelDots[reelIdx].classList.add('active');
            if (reelCounter) reelCounter.textContent = `${reelIdx + 1} / ${reelSlides.length}`;

            const newVid = reelSlides[reelIdx].querySelector('video');
            if (newVid) { newVid.currentTime = 0; newVid.play().catch(() => { }); }
        }

        document.getElementById('reelPrev').addEventListener('click', () => goReelSlide(reelIdx - 1));
        document.getElementById('reelNext').addEventListener('click', () => goReelSlide(reelIdx + 1));
        reelDots.forEach(dot => dot.addEventListener('click', () => goReelSlide(parseInt(dot.dataset.slide))));
        setInterval(() => goReelSlide(reelIdx + 1), 7000);
    </script>
</body>

</html>
