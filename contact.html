<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Seif Studios</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
    <link rel="icon" href="assets/Logo/logoSSnoBG.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="subpage">

    <!-- ─── NAVIGATION ─── -->
    <div id="nav-placeholder"></div>
    <script src="assets/nav.js"></script>

    <main>
        <!-- ─── CONTACT ─── -->
        <section id="contact" style="padding-top: 220px; min-height: 100vh;">
            <div class="container">
                <div class="contact-minimal fade-up">
                    <div class="contact-header">
                        <span class="section-eyebrow">Contact</span>
                        <h2 class="section-title">Let's Create.</h2>
                        <p class="copy-note">Based in Europe — Working Worldwide.</p>
                    </div>

                    <div class="contact-body" style="margin-top:150px">
                        <div class="email-copy-wrap">
                            <p class="section-eyebrow">Email us to discuss your project</p>
                            <div class="contact-methods">
                                <span class="">mail@seifstudios.com</span>
                            </div>
                            <a href="https://instagram.com" target="_blank" class="social-icon-link">
                                <img src="assets/Logo/instagram.svg" alt="Instagram" class="social-icon"
                                    style="margin:20px">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ─── FOOTER ─── -->
    <footer id="footer-placeholder"></footer>
    <script src="assets/main.js"></script>
    <script src="assets/footer.js"></script>

</body>

</html>
