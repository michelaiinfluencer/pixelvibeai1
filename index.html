<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelVibe AI — Creative AI Studio</title>
  <meta name="description"
    content="PixelVibe AI is a creative studio crafting stunning AI-generated images, art, and video for brands that want to stand out." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ─── HEADER ─── -->
  <header class="site-header">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="reel.html">Reel</a></li>
        <li><a href="gallery.html">Work</a></li>
        <li><a href="workflow.html">How It Works</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

    </nav>

    <div class="logo-wrap">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-text">
          <span class="nav-logo-name">Pixel Vibe</span>
          <span class="nav-logo-sub">AI Studio</span>
        </div>
      </a>
    </div>
  </header>

  <!-- ─── HERO with video carousel ─── -->
  <section id="hero">
    <div class="hero-carousel" id="heroCarousel">
      <div class="hc-slide active" data-index="0">
        <video muted playsinline>
          <source src="assets/v4.mp4" type="video/mp4">
        </video>
      </div>
      <div class="hc-slide" data-index="1">
        <video muted playsinline>
          <source src="assets/v2.mp4" type="video/mp4">
        </video>
      </div>
      <div class="hc-slide" data-index="2">
        <video muted playsinline>
          <source src="assets/v3.mp4" type="video/mp4">
        </video>
      </div>
      <div class="hc-slide" data-index="3">
        <video autoplay muted playsinline>
          <source src="assets/hero-bg.mp4" type="video/mp4">
        </video>
      </div>
    </div>

    <!-- ─── LIGHTBOX ─── -->
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">
        <span class="dot"></span>
        <div>
          High-end AI visuals and cinematic content
        </div>
      </div>
      <div class="hero-actions" style="gap: 60px">
        <a href="reel.html" class="btn-ghost-white">Inspire Me</a>
        <a href="contact.html" class="btn-primary">Want to work</a>
      </div>
    </div>

  </section>


  <!-- ─── LIGHTBOX ─── -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightboxImg" src="" alt="" />
  </div>

  <script>
    /* ─── HERO CAROUSEL ─── */
    const heroSlides = document.querySelectorAll('.hc-slide');
    let heroIdx = 0;

    function goHeroSlide(idx) {
      const oldVid = heroSlides[heroIdx].querySelector('video');
      if (oldVid) oldVid.pause();
      heroSlides[heroIdx].classList.remove('active');

      heroIdx = (idx + heroSlides.length) % heroSlides.length;

      heroSlides[heroIdx].classList.add('active');

      const newVid = heroSlides[heroIdx].querySelector('video');
      if (newVid) {
        newVid.currentTime = 0;
        newVid.play().catch(() => { });
      }
    }

    // Initialize: Add 'ended' event listener to all videos to trigger the next one
    heroSlides.forEach((slide, i) => {
      const video = slide.querySelector('video');
      if (video) {
        video.addEventListener('ended', () => {
          goHeroSlide(heroIdx + 1);
        });
      }
    });

    // Ensure the first video plays if autoplay fails or is delayed
    const firstVid = heroSlides[0].querySelector('video');
    if (firstVid) firstVid.play().catch(() => { });

    /* ─── SCROLL EFFECTS ─── */
    const siteHeader = document.querySelector('.site-header');
    const logoWrap = document.querySelector('.logo-wrap');

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const heroHeight = window.innerHeight;

      // 1. Fade out the logo based on scroll depth (0 to 300px)
      const logoOpacity = Math.max(0, 1 - scrollY / 300);
      const logoScale = Math.max(0.9, 1 - scrollY / 1000);

      if (logoWrap) {
        logoWrap.style.opacity = logoOpacity;
        logoWrap.style.transform = `scale(${logoScale})`;
        logoWrap.style.pointerEvents = logoOpacity < 0.1 ? 'none' : 'auto';
      }

      // 2. Toggle solid background on nav after passing hero height
      if (scrollY > heroHeight - 600) {
        siteHeader.classList.add('scrolled');
      } else {
        siteHeader.classList.remove('scrolled');
      }
    });

    /* ─── FADE-IN ON SCROLL ─── */
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-up').forEach((el, i) => {
      el.style.transitionDelay = `${(i % 4) * 80}ms`;
      observer.observe(el);
    });
  </script>

</body>

</html>
